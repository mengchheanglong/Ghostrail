<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghostrail</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      body {
        margin: 0;
        background: #0b1020;
        color: #e5e7eb;
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px 80px;
      }
      .card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        padding: 20px;
        margin-top: 20px;
        backdrop-filter: blur(8px);
      }
      textarea, button {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.03);
        color: inherit;
        padding: 14px;
        box-sizing: border-box;
      }
      textarea {
        min-height: 100px;
        resize: vertical;
        font-family: inherit;
        font-size: 0.95rem;
      }
      button {
        cursor: pointer;
        font-weight: 700;
        margin-top: 12px;
        font-size: 0.95rem;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .muted {
        color: #9ca3af;
        margin: 0 0 4px;
      }
      h1, h2 {
        margin: 0 0 8px;
      }
      h3 {
        margin: 16px 0 6px;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #9ca3af;
      }

      /* ── Two-column layout ── */
      .layout {
        display: flex;
        gap: 20px;
        align-items: flex-start;
        margin-top: 20px;
      }
      .sidebar {
        width: 300px;
        flex-shrink: 0;
      }
      .main {
        flex: 1;
        min-width: 0;
      }

      /* ── Responsive: stack on narrow screens ── */
      @media (max-width: 640px) {
        .layout {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
        }
      }

      /* ── Search input ── */
      .pack-search {
        width: 100%;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.03);
        color: inherit;
        padding: 8px 12px;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 0.85rem;
        margin: 8px 0 4px;
      }
      .pack-search:focus {
        outline: none;
        border-color: rgba(99, 102, 241, 0.5);
      }

      /* ── Pack list ── */
      .pack-list {
        list-style: none;
        margin: 8px 0 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .pack-item {
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.02);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      .pack-item:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .pack-item.selected {
        background: rgba(99, 102, 241, 0.15);
        border-color: rgba(99, 102, 241, 0.5);
      }
      .pack-item-objective {
        font-size: 0.9rem;
        font-weight: 600;
        word-break: break-word;
        margin-bottom: 2px;
      }
      .pack-item-goal {
        font-size: 0.78rem;
        color: #9ca3af;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-bottom: 6px;
      }
      .pack-item-meta {
        font-size: 0.75rem;
        color: #9ca3af;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }
      .badge {
        display: inline-block;
        padding: 1px 7px;
        border-radius: 999px;
        font-size: 0.7rem;
        font-weight: 600;
        background: rgba(255, 255, 255, 0.08);
      }
      .badge-high   { background: rgba(52, 211, 153, 0.2); color: #6ee7b7; }
      .badge-medium { background: rgba(251, 191, 36, 0.2); color: #fcd34d; }
      .badge-low    { background: rgba(248, 113, 113, 0.2); color: #fca5a5; }

      /* ── State messages ── */
      .state-msg {
        font-size: 0.88rem;
        color: #9ca3af;
        padding: 10px 0 4px;
      }
      .state-msg.error {
        color: #fca5a5;
      }

      /* ── Detail view ── */
      .detail-meta {
        font-size: 0.8rem;
        color: #9ca3af;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 4px;
      }
      .detail-objective {
        font-size: 1.05rem;
        font-weight: 600;
        margin: 4px 0 12px;
      }
      .detail-text {
        font-size: 0.9rem;
        line-height: 1.6;
        color: #d1d5db;
        margin: 4px 0 12px;
        word-break: break-word;
      }
      .detail-section ul {
        margin: 4px 0 12px;
        padding-left: 18px;
      }
      .detail-section li {
        font-size: 0.9rem;
        line-height: 1.6;
        color: #d1d5db;
      }

      /* ── Action row ── */
      .detail-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }
      .detail-actions button {
        width: auto;
        margin-top: 0;
        padding: 8px 16px;
        font-size: 0.85rem;
        font-weight: 600;
      }
      .btn-danger {
        color: #fca5a5;
        border-color: rgba(248, 113, 113, 0.3) !important;
      }
      .btn-rerun {
        color: #a5b4fc;
        border-color: rgba(99, 102, 241, 0.3) !important;
      }
      .btn-cancel {
        color: #9ca3af;
        border-color: rgba(156, 163, 175, 0.3) !important;
      }
      .export-status {
        font-size: 0.85rem;
      }
      .export-status.success { color: #6ee7b7; }
      .export-status.error   { color: #fca5a5; }

      /* ── Draft hint ── */
      .draft-hint {
        font-size: 0.82rem;
        color: #6ee7b7;
        margin: 6px 0 0;
      }

      /* ── Duplicate button ── */
      .btn-duplicate {
        color: #86efac;
        border-color: rgba(74, 222, 128, 0.3) !important;
      }

      /* ── Task packet / PR description buttons ── */
      .btn-packet {
        color: #c4b5fd;
        border-color: rgba(167, 139, 250, 0.3) !important;
      }
      .btn-pr-desc {
        color: #93c5fd;
        border-color: rgba(96, 165, 250, 0.3) !important;
      }

      /* ── Status selector ── */
      .status-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0 0 12px;
        flex-wrap: wrap;
      }
      .status-label {
        font-size: 0.8rem;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        white-space: nowrap;
      }
      .status-select {
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        color: inherit;
        padding: 4px 10px;
        font-family: inherit;
        font-size: 0.85rem;
        cursor: pointer;
      }
      .status-select:focus {
        outline: none;
        border-color: rgba(99, 102, 241, 0.5);
      }
      .badge-status-draft       { background: rgba(156, 163, 175, 0.15); color: #d1d5db; }
      .badge-status-approved    { background: rgba(52, 211, 153, 0.15); color: #6ee7b7; }
      .badge-status-in-progress { background: rgba(96, 165, 250, 0.15); color: #93c5fd; }
      .badge-status-done        { background: rgba(52, 211, 153, 0.25); color: #34d399; }
      .badge-status-blocked     { background: rgba(248, 113, 113, 0.15); color: #fca5a5; }
      .badge-status-abandoned   { background: rgba(156, 163, 175, 0.08); color: #6b7280; }

      /* ── Policy warnings ── */
      .policy-warnings {
        background: rgba(251, 191, 36, 0.08);
        border: 1px solid rgba(251, 191, 36, 0.2);
        border-radius: 10px;
        padding: 10px 14px;
        margin: 0 0 12px;
      }
      .policy-warnings-title {
        font-size: 0.78rem;
        font-weight: 700;
        color: #fbbf24;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 0 0 6px;
      }
      .policy-warnings ul {
        margin: 0;
        padding-left: 18px;
      }
      .policy-warnings li {
        font-size: 0.85rem;
        color: #fcd34d;
        line-height: 1.55;
      }

      /* ── Notes section ── */
      .section-heading-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 20px 0 4px;
      }
      .section-heading-row h3 {
        margin: 0;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #9ca3af;
      }
      .btn-small {
        width: auto;
        margin-top: 0;
        padding: 3px 10px;
        font-size: 0.75rem;
        font-weight: 600;
        border-radius: 8px;
        color: #9ca3af;
        border-color: rgba(156, 163, 175, 0.3) !important;
      }
      .notes-display {
        font-size: 0.9rem;
        line-height: 1.6;
        color: #d1d5db;
        margin: 4px 0 8px;
        word-break: break-word;
        white-space: pre-wrap;
      }
      .notes-display.muted {
        color: #9ca3af;
      }
      .notes-textarea {
        min-height: 72px;
        font-size: 0.9rem;
      }
      .notes-editor-actions {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      .notes-editor-actions button {
        width: auto;
        margin-top: 0;
        padding: 6px 14px;
        font-size: 0.82rem;
        font-weight: 600;
      }

      /* ── Tags section ── */
      .tags-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 4px 0 10px;
        min-height: 26px;
      }
      .tag-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 6px 2px 10px;
        border-radius: 999px;
        background: rgba(99, 102, 241, 0.15);
        border: 1px solid rgba(99, 102, 241, 0.3);
        font-size: 0.78rem;
        color: #a5b4fc;
      }
      .tag-chip-remove {
        background: none;
        border: none;
        padding: 0 2px;
        margin: 0;
        width: auto;
        margin-top: 0;
        cursor: pointer;
        color: #9ca3af;
        font-size: 0.9rem;
        line-height: 1;
        border-radius: 4px;
        font-weight: 400;
      }
      .tag-chip-remove:hover {
        color: #fca5a5;
        background: none;
        opacity: 1;
      }
      .tag-input-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .tag-input-row input {
        flex: 1;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.03);
        color: inherit;
        padding: 6px 12px;
        font-family: inherit;
        font-size: 0.85rem;
        box-sizing: border-box;
      }
      .tag-input-row input:focus {
        outline: none;
        border-color: rgba(99, 102, 241, 0.5);
      }
      .tag-input-row button {
        width: auto;
        margin-top: 0;
        padding: 6px 14px;
        font-size: 0.82rem;
        font-weight: 600;
      }

      /* ── Sidebar tags and note indicator ── */
      .pack-item-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 5px;
      }
      .badge-tag {
        background: rgba(99, 102, 241, 0.12);
        color: #a5b4fc;
        border: 1px solid rgba(99, 102, 241, 0.2);
      }
      .note-indicator {
        font-size: 0.7rem;
        color: #9ca3af;
        opacity: 0.7;
      }

      /* ── Star and archive controls ── */
      .btn-star {
        color: #fbbf24;
        border-color: rgba(251, 191, 36, 0.3) !important;
      }
      .btn-archive {
        color: #9ca3af;
        border-color: rgba(156, 163, 175, 0.2) !important;
      }
      .star-indicator {
        color: #fbbf24;
        font-size: 0.78rem;
      }
      .archived-indicator {
        font-size: 0.7rem;
        color: #9ca3af;
        background: rgba(156, 163, 175, 0.08);
        padding: 1px 5px;
        border-radius: 4px;
      }
      .pack-item-archived {
        opacity: 0.45;
      }
      .show-archived-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin: 4px 0 2px;
        font-size: 0.8rem;
        color: #9ca3af;
        cursor: pointer;
        user-select: none;
      }
      .show-archived-row input[type="checkbox"] {
        cursor: pointer;
        accent-color: #6366f1;
        width: auto;
        margin: 0;
        padding: 0;
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Ghostrail</h1>
      <p class="muted">
        Turn a vague software request into an intent pack for humans and coding agents.
      </p>

      <!-- Generator form -->
      <div class="card">
        <h2>Feature request</h2>
        <textarea id="goal" placeholder="Example: Add subscription upgrade flow but do not break current billing or admin behavior."></textarea>
        <textarea id="context" placeholder="Optional repository context: tech stack, sensitive areas, business rules..."></textarea>
        <button id="generate">Generate &amp; Save Intent Pack</button>
        <p id="draftHint" class="draft-hint" style="display:none">↑ Loaded inputs from saved pack — edit freely then generate.</p>
        <p id="generateError" class="state-msg error" style="display:none"></p>
      </div>

      <!-- Two-column browser -->
      <div class="layout">
        <!-- Left: saved packs list -->
        <div class="sidebar">
          <div class="card" style="margin-top:0">
            <h2>Saved Packs</h2>
            <input type="search" id="packSearch" class="pack-search" placeholder="Filter packs…" />
            <label class="show-archived-row">
              <input type="checkbox" id="showArchivedToggle" />
              Show archived
            </label>
            <div id="packListState" class="state-msg">Loading…</div>
            <ul id="packList" class="pack-list" style="display:none"></ul>
          </div>
        </div>

        <!-- Right: detail view -->
        <div class="main">
          <div id="detailCard" class="card" style="margin-top:0; display:none">
            <div id="detailActions" class="detail-actions">
              <button id="exportBtn" disabled>Copy as GitHub Issue</button>
              <button id="taskPacketBtn" class="btn-packet" disabled>Copy as Task Packet</button>
              <button id="prDescBtn" class="btn-pr-desc" disabled>Copy as PR Description</button>
              <button id="rerunBtn" class="btn-rerun" disabled>Re-run from this pack</button>
              <button id="duplicateBtn" class="btn-duplicate" disabled>Duplicate pack</button>
              <button id="starBtn" class="btn-star" disabled>☆ Star</button>
              <button id="archiveBtn" class="btn-archive" disabled>Archive</button>
              <button id="deleteBtn" class="btn-danger" disabled>Delete</button>
              <button id="cancelDeleteBtn" class="btn-cancel" style="display:none">Cancel</button>
              <span id="exportStatus" class="export-status"></span>
            </div>

            <!-- Status row -->
            <div id="statusRow" class="status-row" style="display:none">
              <span class="status-label">Status</span>
              <select id="statusSelect" class="status-select">
                <option value="draft">Draft</option>
                <option value="approved">Approved</option>
                <option value="in-progress">In Progress</option>
                <option value="done">Done</option>
                <option value="blocked">Blocked</option>
                <option value="abandoned">Abandoned</option>
              </select>
            </div>

            <!-- Policy warnings -->
            <div id="policyWarnings" class="policy-warnings" style="display:none">
              <div class="policy-warnings-title">⚠ Policy Warnings</div>
              <ul id="policyWarningsList"></ul>
            </div>

            <!-- Goal section (editable) -->
            <div id="goalSection" style="display:none">
              <div class="section-heading-row">
                <h3>Original Goal</h3>
                <button id="editGoalBtn" class="btn-small">Edit</button>
              </div>
              <p id="goalDisplay" class="detail-text"></p>
              <div id="goalEditor" style="display:none">
                <textarea id="goalEditInput" class="notes-textarea" placeholder="Enter feature goal…"></textarea>
                <p id="goalEditError" class="state-msg error" style="display:none"></p>
                <div class="notes-editor-actions">
                  <button id="saveGoalBtn">Save goal</button>
                  <button id="cancelGoalBtn" class="btn-cancel">Cancel</button>
                </div>
              </div>
            </div>

            <!-- Repository Context section (editable) -->
            <div id="contextSection" style="display:none">
              <div class="section-heading-row">
                <h3>Repository Context</h3>
                <button id="editContextBtn" class="btn-small">Edit</button>
              </div>
              <p id="contextDisplay" class="detail-text"></p>
              <div id="contextEditor" style="display:none">
                <textarea id="contextEditInput" class="notes-textarea" placeholder="Optional repository context…"></textarea>
                <p id="contextEditError" class="state-msg error" style="display:none"></p>
                <div class="notes-editor-actions">
                  <button id="saveContextBtn">Save context</button>
                  <button id="cancelContextBtn" class="btn-cancel">Cancel</button>
                </div>
              </div>
            </div>

            <div id="detailContent"></div>

            <!-- Notes section -->
            <div id="notesSection" style="display:none">
              <div class="section-heading-row">
                <h3>Notes</h3>
                <button id="editNotesBtn" class="btn-small">Edit</button>
              </div>
              <p id="notesDisplay" class="notes-display muted"></p>
              <div id="notesEditor" style="display:none">
                <textarea id="notesInput" class="notes-textarea" placeholder="Add a note about this pack…"></textarea>
                <div class="notes-editor-actions">
                  <button id="saveNotesBtn">Save notes</button>
                  <button id="cancelNotesBtn" class="btn-cancel">Cancel</button>
                </div>
              </div>
            </div>

            <!-- Tags section -->
            <div id="tagsSection" style="display:none">
              <h3 style="margin-top:20px">Tags</h3>
              <div id="tagsList" class="tags-list"></div>
              <div class="tag-input-row">
                <input id="tagInput" type="text" placeholder="Add tag…" />
                <button id="addTagBtn">Add tag</button>
              </div>
              <p id="tagError" class="state-msg error" style="display:none"></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // ── DOM refs ──────────────────────────────────────────────
      const goalInput      = document.getElementById("goal");
      const contextInput   = document.getElementById("context");
      const generateBtn    = document.getElementById("generate");
      const generateError  = document.getElementById("generateError");
      const draftHint      = document.getElementById("draftHint");
      const packListEl     = document.getElementById("packList");
      const packListState  = document.getElementById("packListState");
      const packSearch     = document.getElementById("packSearch");
      const detailCard     = document.getElementById("detailCard");
      const detailContent  = document.getElementById("detailContent");
      const exportBtn      = document.getElementById("exportBtn");
      const rerunBtn       = document.getElementById("rerunBtn");
      const duplicateBtn   = document.getElementById("duplicateBtn");
      const deleteBtn      = document.getElementById("deleteBtn");
      const cancelDeleteBtn = document.getElementById("cancelDeleteBtn");
      const exportStatus   = document.getElementById("exportStatus");
      const showArchivedToggle = document.getElementById("showArchivedToggle");
      const starBtn        = document.getElementById("starBtn");
      const archiveBtn     = document.getElementById("archiveBtn");
      const goalSection    = document.getElementById("goalSection");
      const goalDisplay    = document.getElementById("goalDisplay");
      const goalEditor     = document.getElementById("goalEditor");
      const goalEditInput  = document.getElementById("goalEditInput");
      const goalEditError  = document.getElementById("goalEditError");
      const editGoalBtn    = document.getElementById("editGoalBtn");
      const saveGoalBtn    = document.getElementById("saveGoalBtn");
      const cancelGoalBtn  = document.getElementById("cancelGoalBtn");
      const contextSection   = document.getElementById("contextSection");
      const contextDisplay   = document.getElementById("contextDisplay");
      const contextEditor    = document.getElementById("contextEditor");
      const contextEditInput = document.getElementById("contextEditInput");
      const contextEditError = document.getElementById("contextEditError");
      const editContextBtn   = document.getElementById("editContextBtn");
      const saveContextBtn   = document.getElementById("saveContextBtn");
      const cancelContextBtn = document.getElementById("cancelContextBtn");
      const notesSection   = document.getElementById("notesSection");
      const notesDisplay   = document.getElementById("notesDisplay");
      const notesEditor    = document.getElementById("notesEditor");
      const notesInput     = document.getElementById("notesInput");
      const editNotesBtn   = document.getElementById("editNotesBtn");
      const saveNotesBtn   = document.getElementById("saveNotesBtn");
      const cancelNotesBtn = document.getElementById("cancelNotesBtn");
      const tagsSection    = document.getElementById("tagsSection");
      const tagsList       = document.getElementById("tagsList");
      const tagInput       = document.getElementById("tagInput");
      const addTagBtn      = document.getElementById("addTagBtn");
      const tagError       = document.getElementById("tagError");
      const taskPacketBtn  = document.getElementById("taskPacketBtn");
      const prDescBtn      = document.getElementById("prDescBtn");
      const statusRow      = document.getElementById("statusRow");
      const statusSelect   = document.getElementById("statusSelect");
      const policyWarnings = document.getElementById("policyWarnings");
      const policyWarningsList = document.getElementById("policyWarningsList");

      // Track the currently selected pack id, full object, and the full unfiltered list
      let selectedId   = null;
      let selectedPack = null;
      let allPacks     = [];
      let pendingDelete = false;
      let showArchived  = false;

      const GOAL_PREVIEW_MAX_LEN = 60;

      // ── Helpers ───────────────────────────────────────────────
      const CONFIDENCE_VALUES = ["high", "medium", "low"];
      const VALID_STATUSES = ["draft", "approved", "in-progress", "done", "blocked", "abandoned"];

      function statusLabel(status) {
        const labels = {
          "draft": "Draft", "approved": "Approved", "in-progress": "In Progress",
          "done": "Done", "blocked": "Blocked", "abandoned": "Abandoned"
        };
        return labels[status] || status;
      }

      function statusBadgeClass(status) {
        const key = status ? status.replace(/[^a-z-]/g, "") : "draft";
        return "badge badge-status-" + (VALID_STATUSES.includes(key) ? key : "draft");
      }

      function renderStatusBadge(pack) {
        if (!pack.status || pack.status === "draft") return "";
        return `<span class="${statusBadgeClass(pack.status)}">${escapeHtml(statusLabel(pack.status))}</span>`;
      }

      function updateRerunBtn(pack) {
        rerunBtn.disabled = !pack.goal;
        rerunBtn.title = pack.goal ? "" : "No original goal stored for this pack";
      }

      function updateCurationBtns(pack) {
        starBtn.textContent = pack.starred ? "★ Unstar" : "☆ Star";
        archiveBtn.textContent = pack.archived ? "Unarchive" : "Archive";
      }

      function formatDate(iso) {
        try {
          return new Date(iso).toLocaleString(undefined, {
            year: "numeric", month: "short", day: "numeric",
            hour: "2-digit", minute: "2-digit"
          });
        } catch (_) {
          return iso;
        }
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderList(items) {
        if (!items || items.length === 0) return "<li style='color:#9ca3af'>None</li>";
        return items.map(item => `<li>${escapeHtml(item)}</li>`).join("");
      }

      // ── Client-side filter ────────────────────────────────────
      function getFilteredPacks() {
        const q = packSearch.value.trim().toLowerCase();
        return allPacks.filter(p => {
          if (p.archived && !showArchived) return false;
          if (!q) return true;
          if (p.goal && p.goal.toLowerCase().includes(q)) return true;
          if (p.objective.toLowerCase().includes(q)) return true;
          if (Array.isArray(p.touchedAreas) && p.touchedAreas.some(a => a.toLowerCase().includes(q))) return true;
          if (p.notes && p.notes.toLowerCase().includes(q)) return true;
          if (Array.isArray(p.tags) && p.tags.some(t => t.toLowerCase().includes(q))) return true;
          if (p.repositoryContext && p.repositoryContext.toLowerCase().includes(q)) return true;
          return false;
        });
      }

      // ── Pack list rendering ───────────────────────────────────
      function renderPackList(packs) {
        if (packs.length === 0) {
          const hasQuery = packSearch.value.trim();
          packListState.textContent = hasQuery
            ? "No packs match your filter."
            : "No saved packs yet. Generate one above.";
          packListState.className = "state-msg";
          packListState.style.display = "";
          packListEl.innerHTML = "";
          packListEl.style.display = "none";
          return;
        }

        packListState.style.display = "none";
        packListEl.innerHTML = "";
        packListEl.style.display = "";

        for (const pack of packs) {
          const li = document.createElement("li");
          li.className = "pack-item" + (pack.id === selectedId ? " selected" : "") + (pack.archived ? " pack-item-archived" : "");
          li.dataset.id = pack.id;

          const safeConfidence = CONFIDENCE_VALUES.includes(pack.confidence) ? pack.confidence : "low";
          const confidenceClass = "badge badge-" + safeConfidence;

          li.innerHTML = `
            <div class="pack-item-objective">${escapeHtml(pack.objective)}</div>
            ${pack.goal ? `<div class="pack-item-goal">${escapeHtml(pack.goal)}</div>` : ""}
            <div class="pack-item-meta">
              <span>${escapeHtml(formatDate(pack.createdAt))}</span>
              <span class="${confidenceClass}">${escapeHtml(pack.confidence)}</span>
              <span class="badge">${escapeHtml(pack.reasoningMode)}</span>
              ${renderStatusBadge(pack)}
              ${pack.notes ? `<span class="note-indicator">✎</span>` : ""}
              ${pack.starred ? `<span class="star-indicator">★</span>` : ""}
              ${pack.archived ? `<span class="archived-indicator">archived</span>` : ""}
            </div>
            ${Array.isArray(pack.tags) && pack.tags.length > 0
              ? `<div class="pack-item-tags">${pack.tags.map(t => `<span class="badge badge-tag">${escapeHtml(t)}</span>`).join("")}</div>`
              : ""}
          `;

          li.addEventListener("click", () => selectPack(pack));
          packListEl.appendChild(li);
        }
      }

      // ── Pack detail rendering ─────────────────────────────────
      function renderGoalSection(pack) {
        goalSection.style.display = "";
        goalEditor.style.display = "none";
        editGoalBtn.style.display = "";
        goalEditError.style.display = "none";
        if (pack.goal) {
          goalDisplay.textContent = pack.goal;
          goalDisplay.className = "detail-text";
        } else {
          goalDisplay.textContent = "Not available for older packs.";
          goalDisplay.className = "detail-text muted";
        }
      }

      function renderContextSection(pack) {
        contextSection.style.display = "";
        contextEditor.style.display = "none";
        editContextBtn.style.display = "";
        if (pack.repositoryContext) {
          contextDisplay.textContent = pack.repositoryContext;
          contextDisplay.className = "detail-text";
        } else {
          contextDisplay.textContent = "No repository context.";
          contextDisplay.className = "detail-text muted";
        }
      }

      function renderNotesSection(pack) {
        notesSection.style.display = "";
        notesEditor.style.display = "none";
        editNotesBtn.style.display = "";
        if (pack.notes) {
          notesDisplay.textContent = pack.notes;
          notesDisplay.className = "notes-display";
        } else {
          notesDisplay.textContent = "No notes yet.";
          notesDisplay.className = "notes-display muted";
        }
      }

      function renderTagsSection(pack) {
        tagsSection.style.display = "";
        tagError.style.display = "none";
        tagsList.innerHTML = "";
        const tags = Array.isArray(pack.tags) ? pack.tags : [];
        for (const tag of tags) {
          const chip = document.createElement("span");
          chip.className = "tag-chip";
          chip.appendChild(document.createTextNode(tag));
          const removeBtn = document.createElement("button");
          removeBtn.className = "tag-chip-remove";
          removeBtn.setAttribute("aria-label", "Remove tag " + tag);
          removeBtn.dataset.tag = tag;
          removeBtn.textContent = "×";
          chip.appendChild(removeBtn);
          tagsList.appendChild(chip);
        }
      }

      function renderStatusRow(pack) {
        statusRow.style.display = "";
        const current = VALID_STATUSES.includes(pack.status) ? pack.status : "draft";
        statusSelect.value = current;
      }

      function renderPolicyWarnings(pack) {
        const warnings = Array.isArray(pack.policyWarnings) ? pack.policyWarnings : [];
        if (warnings.length === 0) {
          policyWarnings.style.display = "none";
          return;
        }
        policyWarningsList.innerHTML = "";
        for (const w of warnings) {
          const li = document.createElement("li");
          li.textContent = w;
          policyWarningsList.appendChild(li);
        }
        policyWarnings.style.display = "";
      }

      function selectPack(pack) {
        selectedId   = pack.id;
        selectedPack = pack;

        // Reset pending delete state when switching packs
        pendingDelete = false;
        deleteBtn.textContent = "Delete";
        cancelDeleteBtn.style.display = "none";

        // Update selected highlight
        for (const item of packListEl.querySelectorAll(".pack-item")) {
          item.classList.toggle("selected", item.dataset.id === pack.id);
        }

        exportBtn.disabled = false;
        taskPacketBtn.disabled = false;
        prDescBtn.disabled = false;
        updateRerunBtn(pack);
        duplicateBtn.disabled = false;
        starBtn.disabled = false;
        archiveBtn.disabled = false;
        deleteBtn.disabled = false;
        exportStatus.textContent = "";
        exportStatus.className = "export-status";
        updateCurationBtns(pack);

        detailCard.style.display = "";
        detailContent.innerHTML = `
          <div class="detail-meta">
            <span>ID: ${escapeHtml(pack.id)}</span>
            <span>Created: ${escapeHtml(formatDate(pack.createdAt))}</span>
            <span class="badge badge-${CONFIDENCE_VALUES.includes(pack.confidence) ? pack.confidence : "low"}">${escapeHtml(pack.confidence)} confidence</span>
            <span class="badge">${escapeHtml(pack.reasoningMode)}</span>
          </div>

          <div class="detail-objective">${escapeHtml(pack.objective)}</div>

          <div class="detail-section">
            <h3>Constraints</h3>
            <ul>${renderList(pack.constraints)}</ul>

            <h3>Acceptance Criteria</h3>
            <ul>${renderList(pack.acceptanceCriteria)}</ul>

            <h3>Non-Goals</h3>
            <ul>${renderList(pack.nonGoals)}</ul>

            <h3>Touched Areas</h3>
            <ul>${renderList(pack.touchedAreas)}</ul>

            <h3>Risks</h3>
            <ul>${renderList(pack.risks)}</ul>

            <h3>Open Questions</h3>
            <ul>${renderList(pack.openQuestions)}</ul>
          </div>
        `;

        renderStatusRow(pack);
        renderPolicyWarnings(pack);
        renderGoalSection(pack);
        renderContextSection(pack);
        renderNotesSection(pack);
        renderTagsSection(pack);
      }

      function clearDetail() {
        selectedId   = null;
        selectedPack = null;
        pendingDelete = false;
        detailCard.style.display = "none";
        exportBtn.disabled = true;
        rerunBtn.disabled  = true;
        rerunBtn.title     = "";
        duplicateBtn.disabled = true;
        starBtn.disabled = true;
        starBtn.textContent = "☆ Star";
        archiveBtn.disabled = true;
        archiveBtn.textContent = "Archive";
        deleteBtn.disabled = true;
        deleteBtn.textContent = "Delete";
        cancelDeleteBtn.style.display = "none";
        exportStatus.textContent = "";
        exportStatus.className = "export-status";
        goalSection.style.display = "none";
        goalEditor.style.display = "none";
        goalEditError.style.display = "none";
        contextSection.style.display = "none";
        contextEditor.style.display = "none";
        contextEditError.style.display = "none";
        notesSection.style.display = "none";
        notesEditor.style.display = "none";
        tagsSection.style.display = "none";
        tagError.style.display = "none";
        statusRow.style.display = "none";
        policyWarnings.style.display = "none";
        taskPacketBtn.disabled = true;
        prDescBtn.disabled = true;
      }

      // ── Prefill generator form from a saved pack ─────────────
      function prefillFromPack(pack) {
        goalInput.value    = pack.goal || "";
        contextInput.value = pack.repositoryContext || "";
        generateError.style.display = "none";
        const goalPreview = pack.goal
          ? `"${pack.goal.length > GOAL_PREVIEW_MAX_LEN ? pack.goal.slice(0, GOAL_PREVIEW_MAX_LEN) + "…" : pack.goal}"`
          : "saved pack";
        draftHint.textContent = `↑ Loaded from ${goalPreview} — edit freely then generate.`;
        draftHint.style.display = "";
        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        goalInput.scrollIntoView({ behavior: reduceMotion ? "auto" : "smooth", block: "center" });
        goalInput.focus();
      }

      // ── Load packs from API ───────────────────────────────────
      async function loadPacks() {
        packListState.textContent = "Loading…";
        packListState.className = "state-msg";
        packListState.style.display = "";
        packListEl.style.display = "none";

        try {
          const res = await fetch("/api/intent-packs");
          if (!res.ok) throw new Error("Server returned " + res.status);
          allPacks = await res.json();
          const filtered = getFilteredPacks();
          renderPackList(filtered);
          // Auto-select newest pack if none selected yet
          if (!selectedId && filtered.length > 0) {
            selectPack(filtered[0]);
          }
        } catch (err) {
          packListState.textContent = "Failed to load saved packs: " + (err.message || "unknown error");
          packListState.className = "state-msg error";
          packListState.style.display = "";
          packListEl.style.display = "none";
        }
      }

      // ── Search/filter ─────────────────────────────────────────
      packSearch.addEventListener("input", () => {
        const filtered = getFilteredPacks();
        renderPackList(filtered);
        // Clear selection when the selected pack is filtered out
        if (selectedId && !filtered.some(p => p.id === selectedId)) {
          clearDetail();
        }
      });

      // ── Re-run from saved pack ────────────────────────────────
      rerunBtn.addEventListener("click", () => {
        if (!selectedPack || !selectedPack.goal) return;
        prefillFromPack(selectedPack);
      });

      // ── Generate & save ───────────────────────────────────────
      generateBtn.addEventListener("click", async () => {
        const goal = goalInput.value.trim();
        const repositoryContext = contextInput.value.trim();

        if (!goal) {
          generateError.textContent = "Please enter a feature request first.";
          generateError.style.display = "";
          return;
        }

        generateError.style.display = "none";
        generateBtn.disabled = true;
        generateBtn.textContent = "Generating…";

        try {
          const res = await fetch("/api/intent-pack", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ goal, repositoryContext: repositoryContext || undefined })
          });

          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Server error");
          }

          const saved = await res.json();

          // Re-fetch list to stay in sync, then select the new pack
          selectedId = saved.id;
          await loadPacks();
          selectPack(saved);

          goalInput.value = "";
          contextInput.value = "";
          draftHint.style.display = "none";
        } catch (err) {
          generateError.textContent = "Error: " + (err.message || "unknown error");
          generateError.style.display = "";
        } finally {
          generateBtn.disabled = false;
          generateBtn.textContent = "Generate & Save Intent Pack";
        }
      });

      // ── Export: Copy as GitHub Issue ─────────────────────────
      exportBtn.addEventListener("click", async () => {
        if (!selectedId) return;

        exportBtn.disabled = true;
        exportBtn.textContent = "Copying…";
        exportStatus.textContent = "";
        exportStatus.className = "export-status";

        try {
          const res = await fetch("/api/intent-packs/" + encodeURIComponent(selectedId) + "/export-issue");
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Server error (" + res.status + ")");
          }
          const { markdown } = await res.json();

          try {
            await navigator.clipboard.writeText(markdown);
            exportStatus.textContent = "✓ Copied to clipboard";
            exportStatus.className = "export-status success";
          } catch (_) {
            // Clipboard API unavailable — show the text for manual copy
            exportStatus.textContent = "Clipboard unavailable — markdown logged to console";
            exportStatus.className = "export-status error";
            console.log("GitHub Issue Markdown:\n\n" + markdown);
          }
        } catch (err) {
          exportStatus.textContent = "Export failed: " + (err.message || "unknown error");
          exportStatus.className = "export-status error";
        } finally {
          exportBtn.disabled = false;
          exportBtn.textContent = "Copy as GitHub Issue";
        }
      });

      // ── Export: Copy as Task Packet ───────────────────────────
      taskPacketBtn.addEventListener("click", async () => {
        if (!selectedId) return;

        taskPacketBtn.disabled = true;
        taskPacketBtn.textContent = "Copying…";
        exportStatus.textContent = "";
        exportStatus.className = "export-status";

        try {
          const res = await fetch("/api/intent-packs/" + encodeURIComponent(selectedId) + "/task-packet");
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Server error (" + res.status + ")");
          }
          const { prompt } = await res.json();

          try {
            await navigator.clipboard.writeText(prompt);
            exportStatus.textContent = "✓ Task packet copied to clipboard";
            exportStatus.className = "export-status success";
          } catch (_) {
            exportStatus.textContent = "Clipboard unavailable — prompt logged to console";
            exportStatus.className = "export-status error";
            console.log("Agent Task Packet:\n\n" + prompt);
          }
        } catch (err) {
          exportStatus.textContent = "Export failed: " + (err.message || "unknown error");
          exportStatus.className = "export-status error";
        } finally {
          taskPacketBtn.disabled = false;
          taskPacketBtn.textContent = "Copy as Task Packet";
        }
      });

      // ── Export: Copy as PR Description ────────────────────────
      prDescBtn.addEventListener("click", async () => {
        if (!selectedId) return;

        prDescBtn.disabled = true;
        prDescBtn.textContent = "Copying…";
        exportStatus.textContent = "";
        exportStatus.className = "export-status";

        try {
          const res = await fetch("/api/intent-packs/" + encodeURIComponent(selectedId) + "/pr-description");
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Server error (" + res.status + ")");
          }
          const { markdown } = await res.json();

          try {
            await navigator.clipboard.writeText(markdown);
            exportStatus.textContent = "✓ PR description copied to clipboard";
            exportStatus.className = "export-status success";
          } catch (_) {
            exportStatus.textContent = "Clipboard unavailable — PR description logged to console";
            exportStatus.className = "export-status error";
            console.log("PR Description:\n\n" + markdown);
          }
        } catch (err) {
          exportStatus.textContent = "Export failed: " + (err.message || "unknown error");
          exportStatus.className = "export-status error";
        } finally {
          prDescBtn.disabled = false;
          prDescBtn.textContent = "Copy as PR Description";
        }
      });

      // ── Status change ─────────────────────────────────────────
      statusSelect.addEventListener("change", async () => {
        if (!selectedId || !selectedPack) return;
        const newStatus = statusSelect.value;

        try {
          const res = await fetch("/api/intent-packs/" + encodeURIComponent(selectedId), {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: newStatus })
          });
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Status update failed");
          }
          const updated = await res.json();
          selectedPack = updated;
          const idx = allPacks.findIndex(p => p.id === updated.id);
          if (idx !== -1) allPacks[idx] = updated;
          renderPackList(getFilteredPacks());
        } catch (err) {
          exportStatus.textContent = "Status update failed: " + (err.message || "unknown error");
          exportStatus.className = "export-status error";
          // Revert dropdown
          statusSelect.value = selectedPack.status || "draft";
        }
      });

      // ── Delete pack ───────────────────────────────────────────
      deleteBtn.addEventListener("click", async () => {
        if (!selectedId) return;

        if (!pendingDelete) {
          // First click: ask for inline confirmation
          pendingDelete = true;
          deleteBtn.textContent = "⚠ Confirm delete?";
          cancelDeleteBtn.style.display = "";
          return;
        }

        // Second click: proceed with deletion
        const idToDelete = selectedId;
        pendingDelete = false;
        deleteBtn.disabled = true;
        deleteBtn.textContent = "Deleting…";
        cancelDeleteBtn.style.display = "none";
        exportStatus.textContent = "";
        exportStatus.className = "export-status";

        try {
          const res = await fetch("/api/intent-packs/" + encodeURIComponent(idToDelete), {
            method: "DELETE"
          });
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Delete failed (" + res.status + ")");
          }

          clearDetail();
          await loadPacks();
        } catch (err) {
          deleteBtn.disabled = false;
          deleteBtn.textContent = "Delete";
          exportStatus.textContent = "Delete failed: " + (err.message || "unknown error");
          exportStatus.className = "export-status error";
        }
      });

      // ── Cancel pending delete ─────────────────────────────────
      cancelDeleteBtn.addEventListener("click", () => {
        pendingDelete = false;
        deleteBtn.textContent = "Delete";
        cancelDeleteBtn.style.display = "none";
      });

      // ── Duplicate pack ────────────────────────────────────────
      duplicateBtn.addEventListener("click", async () => {
        if (!selectedId) return;
        duplicateBtn.disabled = true;
        duplicateBtn.textContent = "Duplicating…";
        exportStatus.textContent = "";
        exportStatus.className = "export-status";

        try {
          const res = await fetch("/api/intent-packs/" + encodeURIComponent(selectedId) + "/duplicate", {
            method: "POST"
          });
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Duplicate failed (" + res.status + ")");
          }
          const dup = await res.json();
          selectedId = dup.id;
          await loadPacks();
          selectPack(dup);
        } catch (err) {
          exportStatus.textContent = "Duplicate failed: " + (err.message || "unknown error");
          exportStatus.className = "export-status error";
        } finally {
          duplicateBtn.disabled = false;
          duplicateBtn.textContent = "Duplicate pack";
        }
      });

      // ── Goal editing ──────────────────────────────────────────
      editGoalBtn.addEventListener("click", () => {
        goalEditInput.value = selectedPack?.goal || "";
        goalEditor.style.display = "";
        editGoalBtn.style.display = "none";
        goalEditError.style.display = "none";
        goalEditInput.focus();
      });

      cancelGoalBtn.addEventListener("click", () => {
        goalEditor.style.display = "none";
        editGoalBtn.style.display = "";
        goalEditError.style.display = "none";
      });

      saveGoalBtn.addEventListener("click", async () => {
        if (!selectedId || !selectedPack) return;
        const goal = goalEditInput.value.trim();
        if (!goal) {
          goalEditError.textContent = "Goal must not be empty.";
          goalEditError.style.display = "";
          return;
        }
        goalEditError.style.display = "none";
        saveGoalBtn.disabled = true;
        saveGoalBtn.textContent = "Saving…";

        try {
          const res = await fetch("/api/intent-packs/" + encodeURIComponent(selectedId), {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ goal })
          });
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Save failed");
          }
          const updated = await res.json();
          selectedPack = updated;
          const idx = allPacks.findIndex(p => p.id === updated.id);
          if (idx !== -1) allPacks[idx] = updated;
          updateRerunBtn(updated);
          renderGoalSection(updated);
          renderPackList(getFilteredPacks());
        } catch (err) {
          goalEditError.textContent = "Save failed: " + (err.message || "unknown error");
          goalEditError.style.display = "";
        } finally {
          saveGoalBtn.disabled = false;
          saveGoalBtn.textContent = "Save goal";
        }
      });

      // ── Repository Context editing ────────────────────────────
      editContextBtn.addEventListener("click", () => {
        contextEditInput.value = selectedPack?.repositoryContext || "";
        contextEditor.style.display = "";
        editContextBtn.style.display = "none";
        contextEditError.style.display = "none";
        contextEditInput.focus();
      });

      cancelContextBtn.addEventListener("click", () => {
        contextEditor.style.display = "none";
        editContextBtn.style.display = "";
        contextEditError.style.display = "none";
      });

      saveContextBtn.addEventListener("click", async () => {
        if (!selectedId || !selectedPack) return;
        const repositoryContext = contextEditInput.value.trim();
        contextEditError.style.display = "none";
        saveContextBtn.disabled = true;
        saveContextBtn.textContent = "Saving…";

        try {
          const res = await fetch("/api/intent-packs/" + encodeURIComponent(selectedId), {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ repositoryContext })
          });
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Save failed");
          }
          const updated = await res.json();
          selectedPack = updated;
          const idx = allPacks.findIndex(p => p.id === updated.id);
          if (idx !== -1) allPacks[idx] = updated;
          renderContextSection(updated);
          renderPackList(getFilteredPacks());
        } catch (err) {
          contextEditError.textContent = "Save failed: " + (err.message || "unknown error");
          contextEditError.style.display = "";
        } finally {
          saveContextBtn.disabled = false;
          saveContextBtn.textContent = "Save context";
        }
      });

      // ── Notes editing ─────────────────────────────────────────
      editNotesBtn.addEventListener("click", () => {
        notesInput.value = selectedPack?.notes || "";
        notesEditor.style.display = "";
        editNotesBtn.style.display = "none";
        notesInput.focus();
      });

      cancelNotesBtn.addEventListener("click", () => {
        notesEditor.style.display = "none";
        editNotesBtn.style.display = "";
      });

      saveNotesBtn.addEventListener("click", async () => {
        if (!selectedId || !selectedPack) return;
        const notes = notesInput.value;
        saveNotesBtn.disabled = true;
        saveNotesBtn.textContent = "Saving…";

        try {
          const res = await fetch("/api/intent-packs/" + encodeURIComponent(selectedId), {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ notes })
          });
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Save failed");
          }
          const updated = await res.json();
          selectedPack = updated;
          const idx = allPacks.findIndex(p => p.id === updated.id);
          if (idx !== -1) allPacks[idx] = updated;
          renderNotesSection(updated);
          renderPackList(getFilteredPacks());
        } catch (err) {
          exportStatus.textContent = "Save notes failed: " + (err.message || "unknown error");
          exportStatus.className = "export-status error";
        } finally {
          saveNotesBtn.disabled = false;
          saveNotesBtn.textContent = "Save notes";
        }
      });

      // ── Tag add ───────────────────────────────────────────────
      async function addTag() {
        if (!selectedId || !selectedPack) return;
        const raw = tagInput.value.trim();
        if (!raw) return;
        tagError.style.display = "none";
        const existing = Array.isArray(selectedPack.tags) ? selectedPack.tags : [];
        addTagBtn.disabled = true;

        try {
          const res = await fetch("/api/intent-packs/" + encodeURIComponent(selectedId), {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ tags: [...existing, raw] })
          });
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Add tag failed");
          }
          const updated = await res.json();
          selectedPack = updated;
          const idx = allPacks.findIndex(p => p.id === updated.id);
          if (idx !== -1) allPacks[idx] = updated;
          tagInput.value = "";
          renderTagsSection(updated);
          renderPackList(getFilteredPacks());
        } catch (err) {
          tagError.textContent = "Add tag failed: " + (err.message || "unknown error");
          tagError.style.display = "";
        } finally {
          addTagBtn.disabled = false;
        }
      }

      addTagBtn.addEventListener("click", addTag);
      tagInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); addTag(); }
      });

      // ── Tag remove (delegated) ────────────────────────────────
      tagsList.addEventListener("click", async (e) => {
        const btn = e.target.closest(".tag-chip-remove");
        if (!btn || !selectedId || !selectedPack) return;
        const tagToRemove = btn.dataset.tag;
        const existing = Array.isArray(selectedPack.tags) ? selectedPack.tags : [];
        tagError.style.display = "none";

        try {
          const res = await fetch("/api/intent-packs/" + encodeURIComponent(selectedId), {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ tags: existing.filter(t => t !== tagToRemove) })
          });
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Remove tag failed");
          }
          const updated = await res.json();
          selectedPack = updated;
          const idx = allPacks.findIndex(p => p.id === updated.id);
          if (idx !== -1) allPacks[idx] = updated;
          renderTagsSection(updated);
          renderPackList(getFilteredPacks());
        } catch (err) {
          tagError.textContent = "Remove tag failed: " + (err.message || "unknown error");
          tagError.style.display = "";
        }
      });

      // ── Show archived toggle ─────────────────────────────────
      showArchivedToggle.addEventListener("change", () => {
        showArchived = showArchivedToggle.checked;
        const filtered = getFilteredPacks();
        renderPackList(filtered);
        if (selectedId && !filtered.some(p => p.id === selectedId)) {
          clearDetail();
        }
      });

      // ── Star / unstar pack ────────────────────────────────────
      starBtn.addEventListener("click", async () => {
        if (!selectedId || !selectedPack) return;
        starBtn.disabled = true;
        const newStarred = !selectedPack.starred;
        try {
          const res = await fetch("/api/intent-packs/" + encodeURIComponent(selectedId), {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ starred: newStarred })
          });
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Star failed");
          }
          const updated = await res.json();
          selectedPack = updated;
          const idx = allPacks.findIndex(p => p.id === updated.id);
          if (idx !== -1) allPacks[idx] = updated;
          updateCurationBtns(updated);
          renderPackList(getFilteredPacks());
        } catch (err) {
          exportStatus.textContent = "Star failed: " + (err.message || "unknown error");
          exportStatus.className = "export-status error";
        } finally {
          starBtn.disabled = false;
        }
      });

      // ── Archive / unarchive pack ──────────────────────────────
      archiveBtn.addEventListener("click", async () => {
        if (!selectedId || !selectedPack) return;
        archiveBtn.disabled = true;
        const newArchived = !selectedPack.archived;
        try {
          const res = await fetch("/api/intent-packs/" + encodeURIComponent(selectedId), {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ archived: newArchived })
          });
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Archive failed");
          }
          const updated = await res.json();
          selectedPack = updated;
          const idx = allPacks.findIndex(p => p.id === updated.id);
          if (idx !== -1) allPacks[idx] = updated;
          updateCurationBtns(updated);
          renderPackList(getFilteredPacks());
          // If archived and "show archived" is off, pack disappears — clear detail
          if (updated.archived && !showArchived) {
            clearDetail();
          }
        } catch (err) {
          exportStatus.textContent = "Archive failed: " + (err.message || "unknown error");
          exportStatus.className = "export-status error";
        } finally {
          archiveBtn.disabled = false;
        }
      });

      // ── Boot ─────────────────────────────────────────────────
      loadPacks();
    </script>
  </body>
</html>
