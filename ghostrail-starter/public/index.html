<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghostrail</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      body {
        margin: 0;
        background: #0b1020;
        color: #e5e7eb;
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px 80px;
      }
      .card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        padding: 20px;
        margin-top: 20px;
        backdrop-filter: blur(8px);
      }
      textarea, button {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.03);
        color: inherit;
        padding: 14px;
        box-sizing: border-box;
      }
      textarea {
        min-height: 100px;
        resize: vertical;
        font-family: inherit;
        font-size: 0.95rem;
      }
      button {
        cursor: pointer;
        font-weight: 700;
        margin-top: 12px;
        font-size: 0.95rem;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .muted {
        color: #9ca3af;
        margin: 0 0 4px;
      }
      h1, h2 {
        margin: 0 0 8px;
      }
      h3 {
        margin: 16px 0 6px;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #9ca3af;
      }

      /* ── Two-column layout ── */
      .layout {
        display: flex;
        gap: 20px;
        align-items: flex-start;
        margin-top: 20px;
      }
      .sidebar {
        width: 300px;
        flex-shrink: 0;
      }
      .main {
        flex: 1;
        min-width: 0;
      }

      /* ── Pack list ── */
      .pack-list {
        list-style: none;
        margin: 12px 0 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .pack-item {
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.02);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      .pack-item:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .pack-item.selected {
        background: rgba(99, 102, 241, 0.15);
        border-color: rgba(99, 102, 241, 0.5);
      }
      .pack-item-objective {
        font-size: 0.9rem;
        font-weight: 600;
        word-break: break-word;
        margin-bottom: 6px;
      }
      .pack-item-meta {
        font-size: 0.75rem;
        color: #9ca3af;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }
      .badge {
        display: inline-block;
        padding: 1px 7px;
        border-radius: 999px;
        font-size: 0.7rem;
        font-weight: 600;
        background: rgba(255, 255, 255, 0.08);
      }
      .badge-high   { background: rgba(52, 211, 153, 0.2); color: #6ee7b7; }
      .badge-medium { background: rgba(251, 191, 36, 0.2); color: #fcd34d; }
      .badge-low    { background: rgba(248, 113, 113, 0.2); color: #fca5a5; }

      /* ── State messages ── */
      .state-msg {
        font-size: 0.88rem;
        color: #9ca3af;
        padding: 10px 0 4px;
      }
      .state-msg.error {
        color: #fca5a5;
      }

      /* ── Detail view ── */
      .detail-meta {
        font-size: 0.8rem;
        color: #9ca3af;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 4px;
      }
      .detail-objective {
        font-size: 1.05rem;
        font-weight: 600;
        margin: 4px 0 12px;
      }
      .detail-section ul {
        margin: 4px 0 12px;
        padding-left: 18px;
      }
      .detail-section li {
        font-size: 0.9rem;
        line-height: 1.6;
        color: #d1d5db;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Ghostrail</h1>
      <p class="muted">
        Turn a vague software request into an intent pack for humans and coding agents.
      </p>

      <!-- Generator form -->
      <div class="card">
        <h2>Feature request</h2>
        <textarea id="goal" placeholder="Example: Add subscription upgrade flow but do not break current billing or admin behavior."></textarea>
        <textarea id="context" placeholder="Optional repository context: tech stack, sensitive areas, business rules..."></textarea>
        <button id="generate">Generate &amp; Save Intent Pack</button>
        <p id="generateError" class="state-msg error" style="display:none"></p>
      </div>

      <!-- Two-column browser -->
      <div class="layout">
        <!-- Left: saved packs list -->
        <div class="sidebar">
          <div class="card" style="margin-top:0">
            <h2>Saved Packs</h2>
            <div id="packListState" class="state-msg">Loading…</div>
            <ul id="packList" class="pack-list" style="display:none"></ul>
          </div>
        </div>

        <!-- Right: detail view -->
        <div class="main">
          <div id="detailCard" class="card" style="margin-top:0; display:none">
            <div id="detailContent"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // ── DOM refs ──────────────────────────────────────────────
      const goalInput      = document.getElementById("goal");
      const contextInput   = document.getElementById("context");
      const generateBtn    = document.getElementById("generate");
      const generateError  = document.getElementById("generateError");
      const packListEl     = document.getElementById("packList");
      const packListState  = document.getElementById("packListState");
      const detailCard     = document.getElementById("detailCard");
      const detailContent  = document.getElementById("detailContent");

      // Track the currently selected pack id
      let selectedId = null;

      // ── Helpers ───────────────────────────────────────────────
      const CONFIDENCE_VALUES = ["high", "medium", "low"];
      function formatDate(iso) {
        try {
          return new Date(iso).toLocaleString(undefined, {
            year: "numeric", month: "short", day: "numeric",
            hour: "2-digit", minute: "2-digit"
          });
        } catch (_) {
          return iso;
        }
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderList(items) {
        if (!items || items.length === 0) return "<li style='color:#9ca3af'>None</li>";
        return items.map(item => `<li>${escapeHtml(item)}</li>`).join("");
      }

      // ── Pack list rendering ───────────────────────────────────
      function renderPackList(packs) {
        if (packs.length === 0) {
          packListState.textContent = "No saved packs yet. Generate one above.";
          packListState.className = "state-msg";
          packListState.style.display = "";
          packListEl.style.display = "none";
          return;
        }

        packListState.style.display = "none";
        packListEl.innerHTML = "";
        packListEl.style.display = "";

        for (const pack of packs) {
          const li = document.createElement("li");
          li.className = "pack-item" + (pack.id === selectedId ? " selected" : "");
          li.dataset.id = pack.id;

          const safeConfidence = CONFIDENCE_VALUES.includes(pack.confidence) ? pack.confidence : "low";
          const confidenceClass = "badge badge-" + safeConfidence;

          li.innerHTML = `
            <div class="pack-item-objective">${escapeHtml(pack.objective)}</div>
            <div class="pack-item-meta">
              <span>${escapeHtml(formatDate(pack.createdAt))}</span>
              <span class="${confidenceClass}">${escapeHtml(pack.confidence)}</span>
              <span class="badge">${escapeHtml(pack.reasoningMode)}</span>
            </div>
          `;

          li.addEventListener("click", () => selectPack(pack));
          packListEl.appendChild(li);
        }
      }

      // ── Pack detail rendering ─────────────────────────────────
      function selectPack(pack) {
        selectedId = pack.id;

        // Update selected highlight
        for (const item of packListEl.querySelectorAll(".pack-item")) {
          item.classList.toggle("selected", item.dataset.id === pack.id);
        }

        detailCard.style.display = "";
        detailContent.innerHTML = `
          <div class="detail-meta">
            <span>ID: ${escapeHtml(pack.id)}</span>
            <span>Created: ${escapeHtml(formatDate(pack.createdAt))}</span>
            <span class="badge badge-${CONFIDENCE_VALUES.includes(pack.confidence) ? pack.confidence : "low"}">${escapeHtml(pack.confidence)} confidence</span>
            <span class="badge">${escapeHtml(pack.reasoningMode)}</span>
          </div>

          <div class="detail-objective">${escapeHtml(pack.objective)}</div>

          <div class="detail-section">
            <h3>Constraints</h3>
            <ul>${renderList(pack.constraints)}</ul>

            <h3>Acceptance Criteria</h3>
            <ul>${renderList(pack.acceptanceCriteria)}</ul>

            <h3>Non-Goals</h3>
            <ul>${renderList(pack.nonGoals)}</ul>

            <h3>Touched Areas</h3>
            <ul>${renderList(pack.touchedAreas)}</ul>

            <h3>Risks</h3>
            <ul>${renderList(pack.risks)}</ul>

            <h3>Open Questions</h3>
            <ul>${renderList(pack.openQuestions)}</ul>
          </div>
        `;
      }

      // ── Load packs from API ───────────────────────────────────
      async function loadPacks() {
        packListState.textContent = "Loading…";
        packListState.className = "state-msg";
        packListState.style.display = "";
        packListEl.style.display = "none";

        try {
          const res = await fetch("/api/intent-packs");
          if (!res.ok) throw new Error("Server returned " + res.status);
          const packs = await res.json();
          renderPackList(packs);
          // Auto-select newest pack if none selected yet
          if (!selectedId && packs.length > 0) {
            selectPack(packs[0]);
          }
        } catch (err) {
          packListState.textContent = "Failed to load saved packs: " + (err.message || "unknown error");
          packListState.className = "state-msg error";
          packListState.style.display = "";
          packListEl.style.display = "none";
        }
      }

      // ── Generate & save ───────────────────────────────────────
      generateBtn.addEventListener("click", async () => {
        const goal = goalInput.value.trim();
        const repositoryContext = contextInput.value.trim();

        if (!goal) {
          generateError.textContent = "Please enter a feature request first.";
          generateError.style.display = "";
          return;
        }

        generateError.style.display = "none";
        generateBtn.disabled = true;
        generateBtn.textContent = "Generating…";

        try {
          const res = await fetch("/api/intent-pack", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ goal, repositoryContext })
          });

          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Server error");
          }

          const saved = await res.json();

          // Re-fetch list to stay in sync, then select the new pack
          selectedId = saved.id;
          await loadPacks();
          selectPack(saved);

          goalInput.value = "";
          contextInput.value = "";
        } catch (err) {
          generateError.textContent = "Error: " + (err.message || "unknown error");
          generateError.style.display = "";
        } finally {
          generateBtn.disabled = false;
          generateBtn.textContent = "Generate & Save Intent Pack";
        }
      });

      // ── Boot ─────────────────────────────────────────────────
      loadPacks();
    </script>
  </body>
</html>
