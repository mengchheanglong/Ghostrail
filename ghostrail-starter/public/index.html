<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghostrail</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      body {
        margin: 0;
        background: #0b1020;
        color: #e5e7eb;
      }
      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 40px 20px 80px;
      }
      .card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        padding: 20px;
        margin-top: 20px;
        backdrop-filter: blur(8px);
      }
      textarea, button {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.03);
        color: inherit;
        padding: 14px;
        box-sizing: border-box;
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }
      button {
        cursor: pointer;
        font-weight: 700;
        margin-top: 12px;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: rgba(0, 0, 0, 0.25);
        padding: 16px;
        border-radius: 12px;
        overflow: auto;
      }
      .muted {
        color: #9ca3af;
      }
      h1, h2 {
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Ghostrail</h1>
      <p class="muted">
        Turn a vague software request into an intent pack for humans and coding agents.
      </p>

      <div class="card">
        <h2>Feature request</h2>
        <textarea id="goal" placeholder="Example: Add subscription upgrade flow but do not break current billing or admin behavior."></textarea>
        <textarea id="context" placeholder="Optional repository context: tech stack, sensitive areas, business rules..."></textarea>
        <button id="generate">Generate Intent Pack</button>
      </div>

      <div class="card">
        <h2>Intent Pack JSON</h2>
        <pre id="output">Nothing generated yet.</pre>
      </div>

      <div class="card">
        <h2>GitHub Issue Markdown</h2>
        <pre id="issueOutput">Nothing generated yet.</pre>
      </div>
    </div>

    <script>
      const goalInput = document.getElementById("goal");
      const contextInput = document.getElementById("context");
      const output = document.getElementById("output");
      const issueOutput = document.getElementById("issueOutput");
      const button = document.getElementById("generate");

      button.addEventListener("click", async () => {
        const goal = goalInput.value.trim();
        const repositoryContext = contextInput.value.trim();

        if (!goal) {
          output.textContent = "Please enter a feature request first.";
          return;
        }

        output.textContent = "Generating...";
        issueOutput.textContent = "Generating...";

        const response = await fetch("/api/intent-pack/export-issue", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ goal, repositoryContext })
        });

        const data = await response.json();
        output.textContent = JSON.stringify(data.pack, null, 2);
        issueOutput.textContent = data.markdown;
      });
    </script>
  </body>
</html>
